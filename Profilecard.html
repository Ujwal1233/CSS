<!DOCTYPE html>
<html>
<head>
<title>Profile Card</title>

<style>

body{
    background:#e9e9dc;
    font-family:Arial, sans-serif;
}

.card{
    width:320px;
    height:520px;
    margin:50px auto;
    background:white;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.top{
    height:200px;
    background:linear-gradient(135deg,#c04a64,#d26a7a);
    border-bottom-left-radius:60% 30%;
    border-bottom-right-radius:60% 30%;
    position:relative;
}

.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    position:absolute;
    left:50%;
    bottom:-55px;
    transform:translateX(-50%);
    border:6px solid white;
}

.bottom{
    text-align:center;
    padding-top:70px;
    padding-left:20px;
    padding-right:20px;
}

.bottom h2{
    font-size:14px;
    letter-spacing:1px;
    margin-bottom:5px;
}

.username{
    color:gray;
    font-size:12px;
}

.icons{
    margin:15px 0;
}

.icons span{
    margin:0 8px;
    font-size:14px;
}

.desc{
    font-size:12px;
    color:#666;
    margin-top:15px;
}

.work{
    font-size:12px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<div class="top">
<img src="Ujwal.jpg.jpeg" class="profile">
</div>

<div class="bottom">

<h2>Ujwal D</h2>
<p class="username">ujwaldhananjaya@gmail.com</p>

<div class="icons">
<span>PYTHON</span>
<span>FULL</span>
<span>STACK</span>
<span>INTERN</span>
</div>

<p class="desc">
Brand and communication strategy, graphic design,
illustration, art direction and portrait photography.
</p>

<p class="work">Creative at Superblaise.</p>

</div>

</div>

</body>
</html>
