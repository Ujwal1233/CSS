<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visiting Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 780px;
      height: 420px;
      background: linear-gradient(135deg, #f44336 0%, #d81b60 100%);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      padding: 50px 40px;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 52%;
      height: 100%;
      background: #f5f5f5;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top h1 {
      font-size: 62px;
      color: #4a1f2b;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .top h2 {
      font-size: 28px;
      color: #4a1f2b;
      font-weight: 700;
      text-transform: uppercase;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .left-info p {
      font-size: 26px;
      color: #4a1f2b;
      margin-bottom: 14px;
    }

    .left-info p.bold {
      font-weight: bold;
    }

    .right-info {
      color: #f44336;
      font-size: 24px;
      font-weight: 500;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="top">
        <h1>Ujwal D</h1>
        <h2>Python Full Stack Intern</h2>
      </div>

      <div class="bottom">
        <div class="left-info">
          <p class="bold">ujwaldhananjaya@gmail.com</p>
          <p class="bold">+91 7349173075</p>
        </div>

        <div class="right-info">
          Dhee Codong Lab, Rajajinagar
        </div>
      </div>
    </div>
  </div>
</body>
</html>
